<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>VdoCipher Player</title>
    <style>
        html, body {
          margin: 0;
          padding: 0;
          height: 100%;
          overflow: hidden;
        }
        iframe {
          border: none;
          width: 100%;
          height: 100%;
        }
    </style>
</head>
<body>
<iframe
        id="vdocipher-player"
        allowfullscreen
        allow="autoplay"
        src="">
</iframe>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const otp = urlParams.get("otp");
    const playbackInfo = urlParams.get("playbackInfo");

    const iframeSrc = `https://player.vdocipher.com/v2/?otp=${otp}&playbackInfo=${playbackInfo}`;
    document.getElementById("vdocipher-player").src = iframeSrc;
</script>
</body>
</html>
